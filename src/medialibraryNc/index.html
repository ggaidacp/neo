<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentrale Tabelle</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: white;
      font-family: DVAG Type, Arial, sans-serif;
    }
    table {
      border-collapse: collapse;
      width: 60%;  Optional: /*Breite der Tabelle anpassen */
    }
    th {
      border: 1px solid black;
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: #f2f2f2;
    }
    .centered {
      text-align: center;
      padding-bottom: 10px
      padding-top: 10px
    }
    .large-font {
      font-size: 30px; /* Hier die gewünschte Schriftgröße anpassen */
    }
  </style>
</head>

<body>

<table>
  <tr>
    <td colspan="3" class="large-font centered">
      Unsere Clouds
    </td>
  </tr>
  <tr>
    <td colspan="3" class="centered">
      <br><br>
  </tr>
  <tr>
    <td class="centered">
      <a href="https://www.unterlagenportal.dvag" target="_blank">
        <img src="qrc:/images/unterlagenportal.png" alt="Icon DVAG">
      </a>
    </td>

    <td class="centered">
      <a href="https://www.office.com/launch/onedrive" target="_blank">
        <img src="qrc:/images/onedrive.png" alt="Icon One Drive">
      </a>

    </td>
    <td class="centered">
      <a href="https://www.dropbox.com/login" target="_blank">
        <img src="qrc:/images/dropbox.png" alt="Icon dropbox">
      </a>
    </td>
  </tr>
  <tr>
    <td colspan="3" class="centered">
      <br><br>
  </tr>
  <tr>
    <td class="centered">
      <a href="https://accounts.google.com" target="_blank">
        <img src="qrc:/images/googledrive.png" alt="Icon OneDrive">
      </a>

    </td>
    <td class="centered">
      <a href="https://icloud.com" target="_blank">
        <img src="qrc:/images/icloud.png" alt="Icon Google Drive">
      </a>

    </td>
    <td class="centered">
      <a href="https://google.de" target="_blank">
        <img src="qrc:/images/internet.png" alt="Icon OneDrive">
      </a>

    </td>
  </tr>
</table>




</body>

</html>
